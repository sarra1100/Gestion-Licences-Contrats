<div class="container mt-5">
  <h2 class="text-center mb-4">Ajouter un Contrat</h2>

  <form [formGroup]="contratForm" (ngSubmit)="addContrat()">
    <!-- Client -->
    <div class="form-group mb-3">
      <label for="client" class="form-label">Client</label>
      <app-searchable-client-select formControlName="client" [clients]="clients"></app-searchable-client-select>
      <div *ngIf="contratForm.get('client')?.touched && contratForm.get('client')?.invalid" class="text-danger">
        Ce champ est obligatoire.
      </div>
    </div>

    <!-- Produit -->
    <div class="form-group mb-3">
      <label for="nomProduit" class="form-label">Produit</label>
      <select id="nomProduit" class="form-control" formControlName="nomProduit">
        <option value="">-- Sélectionner un produit --</option>
        <option *ngFor="let p of nomProduitOptions" [value]="p">{{ p.replace('_', ' ') }}</option>
      </select>
    </div>

    <!-- Objet du Contrat -->
    <div class="form-group mb-3">
      <label for="objetContrat" class="form-label">Objet du Contrat</label>
      <input type="text" id="objetContrat" class="form-control" formControlName="objetContrat"
        placeholder="Objet du contrat" />
      <div *ngIf="contratForm.get('objetContrat')?.touched && contratForm.get('objetContrat')?.invalid"
        class="text-danger">
        Ce champ est obligatoire.
      </div>
    </div>

    <!-- Nombre Interventions Préventives -->
    <div class="form-group mb-3">
      <label for="nbInterventionsPreventives" class="form-label">Nombre d'Interventions Préventives</label>
      <select id="nbInterventionsPreventives" class="form-control" formControlName="nbInterventionsPreventives">
        <option value="" disabled>-- Selectionner --</option>
        <option value="2">2</option>
        <option value="4">4</option>
      </select>
      <div
        *ngIf="contratForm.get('nbInterventionsPreventives')?.touched && contratForm.get('nbInterventionsPreventives')?.invalid"
        class="text-danger">
        Ce champ est obligatoire.
      </div>
    </div>

    <!-- Nombre Interventions Curatives -->
    <div class="form-group mb-3">
      <label for="nbInterventionsCuratives" class="form-label">Nombre d'Interventions Curatives</label>
      <input type="text" id="nbInterventionsCuratives" class="form-control" formControlName="nbInterventionsCuratives"
        placeholder="Ex: 10j, 5j" />
      <div
        *ngIf="contratForm.get('nbInterventionsCuratives')?.touched && contratForm.get('nbInterventionsCuratives')?.invalid"
        class="text-danger">
        Ce champ est obligatoire.
      </div>
    </div>

    <!-- Date Début -->
    <div class="form-group mb-3">
      <label for="dateDebut" class="form-label">Date de Début</label>
      <input type="date" id="dateDebut" class="form-control" formControlName="dateDebut" />
      <div *ngIf="contratForm.get('dateDebut')?.touched && contratForm.get('dateDebut')?.invalid" class="text-danger">
        Ce champ est obligatoire.
      </div>
    </div>

    <!-- Date Fin -->
    <div class="form-group mb-3" [class.field-disabled]="dateFinDisabled">
      <label for="dateFin" class="form-label">Date de Fin</label>

      <!-- Boutons durée rapide -->
      <div class="quick-duration-btns" *ngIf="!dateFinDisabled">
        <span class="quick-label">Durée rapide :</span>
        <button type="button" class="btn-duration" (click)="setDuration('1w')">
          <i class="fas fa-calendar-week"></i> 1 semaine
        </button>
        <button type="button" class="btn-duration" (click)="setDuration('3m')">
          <i class="fas fa-calendar-alt"></i> 3 mois
        </button>
        <button type="button" class="btn-duration btn-duration-main" (click)="setDuration('6m')">
          <i class="fas fa-calendar-check"></i> 6 mois
        </button>
        <button type="button" class="btn-duration" (click)="setDuration('1y')">
          <i class="fas fa-calendar"></i> 1 an
        </button>
      </div>

      <input
        type="date"
        id="dateFin"
        class="form-control"
        formControlName="dateFin"
        [style.background-color]="dateFinDisabled ? '#e9ecef' : ''"
        [style.color]="dateFinDisabled ? '#6c757d' : ''"
        [style.cursor]="dateFinDisabled ? 'not-allowed' : ''"
        [style.pointer-events]="dateFinDisabled ? 'none' : 'auto'"
        [style.opacity]="dateFinDisabled ? '0.75' : '1'"
      />
      <div *ngIf="contratForm.get('dateFin')?.touched && contratForm.get('dateFin')?.invalid" class="text-danger">
        Ce champ est obligatoire.
      </div>
    </div>

    <!-- Renouvelable -->
    <div class="form-group mb-3">
      <label class="form-label">Renouvelable</label>
      <div class="form-check">
        <input type="checkbox" id="renouvelable" class="form-check-input"
          formControlName="renouvelable"
          (change)="onRenouvelableChange($event)" />
        <label for="renouvelable" class="form-check-label">Oui</label>
      </div>
      <small class="text-muted" *ngIf="contratForm.get('renouvelable')?.value">
        <i class="fas fa-info-circle"></i> Le contrat est renouvelable : la date de fin est désactivée.
      </small>
    </div>

    <!-- Remarque -->
    <div class="form-group mb-3">
      <label for="remarque" class="form-label">Remarque</label>
      <textarea id="remarque" class="form-control" formControlName="remarque" placeholder="Remarques éventuelles"
        rows="3"></textarea>
    </div>

    <!-- Email Commercial -->
    <div class="form-group mb-3">
      <label for="emailCommercial" class="form-label">Email Commercial</label>
      <input type="email" id="emailCommercial" class="form-control" formControlName="emailCommercial"
        placeholder="Email du commercial" />
      <div *ngIf="contratForm.get('emailCommercial')?.touched && contratForm.get('emailCommercial')?.invalid"
        class="text-danger">
        Veuillez entrer un email valide.
      </div>
    </div>

    <!-- Emails en CC -->
    <div class="form-group mb-3">
      <label class="form-label">Email(s) en Copie</label>
      <div formArrayName="ccMail">
        <div *ngFor="let email of ccMailArray.controls; let i = index" class="input-group mb-2">
          <input type="email" class="form-control" [formControlName]="i" placeholder="Email en copie" />
          <button type="button" class="btn btn-danger" (click)="removeCcMail(i)">
            <i class="fa fa-minus"></i>
          </button>
        </div>
      </div>
      <button type="button" class="btn btn-sm btn-secondary" (click)="addCcMail()">
        <i class="fa fa-plus"></i> Ajouter un email en CC
      </button>
    </div>

    <!-- Boutons -->
    <div class="d-flex justify-content-between mt-4">
      <button type="button" class="btn btn-secondary" (click)="cancel()">Annuler</button>
      <button type="submit" class="btn btn-primary" [disabled]="contratForm.invalid">Enregistrer</button>
    </div>
  </form>
</div>
