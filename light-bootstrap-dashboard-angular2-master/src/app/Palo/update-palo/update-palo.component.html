<div class="container mt-5">
  <h2 class="text-center mb-4">Mettre à jour Paloalto</h2>
  <form [formGroup]="updateForm" (ngSubmit)="onSubmit()">
    <div class="form-group mb-3">
      <label for="client">Client</label>
      <app-searchable-client-select formControlName="client" [clients]="clients"></app-searchable-client-select>
      <div *ngIf="updateForm.get('client')?.touched && updateForm.get('client')?.invalid" class="text-danger">
        Ce champ est obligatoire.
      </div>
    </div>

    <div class="form-group mb-3">
      <label for="nomDuBoitier">Nom du Boîtier</label>
      <input id="nomDuBoitier" type="text" class="form-control" formControlName="nomDuBoitier" />
      <div *ngIf="updateForm.get('nomDuBoitier')?.touched && updateForm.get('nomDuBoitier')?.invalid" class="text-danger">
        Ce champ est obligatoire.
      </div>
    </div>

    <div class="form-group mb-3">
      <label for="numeroSerieBoitier">Numéro de Série</label>
      <input id="numeroSerieBoitier" type="text" class="form-control" formControlName="numeroSerieBoitier" />
      <div *ngIf="updateForm.get('numeroSerieBoitier')?.touched && updateForm.get('numeroSerieBoitier')?.invalid" class="text-danger">
        Ce champ est obligatoire.
      </div>
    </div>

   <!-- Licences -->
      <div formArrayName="licences" class="mb-3">
        <label class="form-label">Licences</label>
        <div
          *ngFor="let licence of licences.controls; let i = index"
          [formGroupName]="i"
          class="row align-items-end mb-2"
        >
          <div class="col-md-4">
            <input
              type="text"
              class="form-control"
              placeholder="Nom de licence"
              formControlName="nomDesLicences"
            />
          </div>
          <div class="col-md-3">
            <input
              type="text"
              class="form-control"
              placeholder="Quantité"
              formControlName="quantite"
            />
          </div>
          <div class="col-md-4">
            <input
              type="date"
              class="form-control"
              formControlName="dateEx"
            />
          </div>
          <div class="col-md-1">
            <button
              type="button"
              class="btn btn-danger"
              (click)="removeLicence(i)"
              *ngIf="licences.length > 1"
            >
              ×
            </button>
          </div>
        </div>
        <button type="button" class="btn btn-secondary mt-2" (click)="addLicence()">
          Ajouter une licence
        </button>
      </div>

    <div class="form-group mb-3">
      <label for="dureeDeLicence">Durée de la Licence</label>
      <input id="dureeDeLicence" type="text" class="form-control" formControlName="dureeDeLicence" />
    </div>

    <div class="form-group mb-3">
      <label for="nomDuContact">Nom du Contact</label>
      <input id="nomDuContact" type="text" class="form-control" formControlName="nomDuContact" />
    </div>

    <div class="form-group mb-3">
      <label for="adresseEmailContact">Adresse Email du Contact</label>
      <input id="adresseEmailContact" type="email" class="form-control" formControlName="adresseEmailContact" />
      <div *ngIf="updateForm.get('adresseEmailContact')?.touched && updateForm.get('adresseEmailContact')?.invalid" class="text-danger">
        Veuillez entrer une adresse email valide.
      </div>
    </div>
    <div class="form-group">
      <label for="mailAdmin">Email Admin</label>
      <input id="mailAdmin" type="email" class="form-control" formControlName="mailAdmin" />
      <div *ngIf="updateForm.get('mailAdmin')?.touched && updateForm.get('mailAdmin')?.invalid" class="text-danger">
        <div *ngIf="updateForm.get('mailAdmin')?.errors?.['email']">Format email invalide</div>
      </div>
    </div>
    <div formArrayName="ccMail" class="form-group">
    <label>Emails en copie (CC)</label>
    <div *ngFor="let ccCtrl of ccMail.controls; let i = index">
      <input [formControlName]="i" type="email" class="form-control mb-2" placeholder="Email CC" />
      <button type="button" class="btn btn-danger btn-sm mb-2" (click)="ccMail.removeAt(i)" *ngIf="ccMail.length > 1">Supprimer</button>
    </div>
    <button type="button" class="btn btn-primary btn-sm" (click)="ccMail.push(fb.control('', Validators.email))">Ajouter un email CC</button>
    </div>
    <div class="form-group mb-3">
      <label for="numero">Numéro</label>
      <input id="numero" type="text" class="form-control" formControlName="numero" />
    </div>

    <div class="form-group mb-3">
      <label for="remarque">Remarque</label>
      <textarea id="remarque" class="form-control" formControlName="remarque"></textarea>
    </div>
    <div class="form-check mb-3">
      <input id="sousContrat" type="checkbox" class="form-check-input" formControlName="sousContrat" />
      <label class="form-check-label" for="sousContrat">Sous Contrat</label>
    </div>

    <!-- Section Upload de Fichier -->
    <div class="form-group mb-3">
      <label class="form-label"><strong>📎 Fichier attaché</strong></label>
      
      <!-- Fichier existant -->
      <div *ngIf="currentFileName" class="alert alert-info d-flex align-items-center justify-content-between mb-2">
        <div>
          <i class="fa fa-file"></i> 
          <span class="ms-2">{{ currentFileOriginalName || currentFileName }}</span>
        </div>
        <div>
          <button type="button" class="btn btn-sm btn-success me-2" (click)="downloadFile()">
            <i class="fa fa-download"></i> Télécharger
          </button>
          <button type="button" class="btn btn-sm btn-danger" (click)="deleteFile()">
            <i class="fa fa-trash"></i> Supprimer
          </button>
        </div>
      </div>

      <!-- Upload nouveau fichier -->
      <div class="input-group">
        <input 
          type="file" 
          class="form-control" 
          (change)="onFileSelected($event)"
          #fileInput
        />
        <button 
          type="button" 
          class="btn btn-primary" 
          (click)="uploadFile()" 
          [disabled]="!selectedFile || uploading"
        >
          <span *ngIf="!uploading"><i class="fa fa-upload"></i> Uploader</span>
          <span *ngIf="uploading"><i class="fa fa-spinner fa-spin"></i> {{ uploadProgress }}%</span>
        </button>
      </div>

      <!-- Barre de progression -->
      <div *ngIf="uploading" class="progress mt-2" style="height: 20px;">
        <div 
          class="progress-bar progress-bar-striped progress-bar-animated" 
          role="progressbar" 
          [style.width.%]="uploadProgress"
          [attr.aria-valuenow]="uploadProgress" 
          aria-valuemin="0" 
          aria-valuemax="100"
        >
          {{ uploadProgress }}%
        </div>
      </div>

      <!-- Message de succès/erreur -->
      <div *ngIf="uploadMessage" class="mt-2">
        <div [class]="uploadSuccess ? 'alert alert-success' : 'alert alert-danger'">
          <i [class]="uploadSuccess ? 'fa fa-check-circle' : 'fa fa-exclamation-circle'"></i>
          {{ uploadMessage }}
        </div>
      </div>
    </div>

     <!-- Commande Passer Par -->
      <div class="form-group mb-3">
        <label for="commandePasserPar" class="form-label">Commande Passer Par</label>
        <select id="commandePasserPar" formControlName="commandePasserPar" class="form-control">
          <option *ngFor="let option of commandePasserParOptions" [value]="option.value">
            {{ option.label }}
          </option>
        </select>
      </div>
    <button type="submit" class="btn btn-success" [disabled]="updateForm.invalid">Mettre à jour</button>
    <button type="button" class="btn btn-secondary" (click)="onCancel()">Annuler</button>
  </form>
</div>
