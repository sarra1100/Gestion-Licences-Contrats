<div class="container mt-5">
  <h2 class="text-center mb-4">Ajouter licence Paloalto</h2>
  
  <form [formGroup]="PaloForm" (ngSubmit)="addPalo()">
    <!-- Client -->
    <div class="form-group mb-3">
      <label for="client" class="form-label">Client</label>
      <app-searchable-client-select formControlName="client" [clients]="clients"></app-searchable-client-select>
      <div *ngIf="PaloForm.get('client')?.touched && PaloForm.get('client')?.invalid" class="text-danger">
        Ce champ est obligatoire.
      </div>
    </div>

    <!-- Nom du Boîtier -->
    <div class="form-group mb-3">
      <label for="nomDuBoitier" class="form-label">Nom du Boîtier</label>
      <input
        type="text"
        id="nomDuBoitier"
        class="form-control"
        formControlName="nomDuBoitier"
        placeholder="Nom du boîtier"
      />
      <div *ngIf="PaloForm.get('nomDuBoitier')?.touched && PaloForm.get('nomDuBoitier')?.invalid" class="text-danger">
        Ce champ est obligatoire.
      </div>
    </div>
<!-- Licences -->
<div formArrayName="licences">
  <label class="form-label">Licences</label>
  <div
    *ngFor="let licence of licences.controls; let i = index"
    [formGroupName]="i"
    class="row align-items-end mb-2"
  >
    <div class="col-md-4">
      <input
        type="text"
        class="form-control"
        placeholder="Nom de licence"
        formControlName="nomDesLicences"
      />
    </div>
    <div class="col-md-3">
      <input
        type="text"
        class="form-control"
        placeholder="quantité"
        formControlName="quantite"
      />
    </div>
    <div class="col-md-4">
      <input
        type="date"
        class="form-control"
        formControlName="dateEx"
      />
    </div>
    <div class="col-md-1">
      <button
        type="button"
        class="btn btn-danger"
        (click)="removeLicence(i)"
        *ngIf="licences.length > 1"
      >
        ×
      </button>
    </div>
  </div>
  <button type="button" class="btn btn-secondary mt-2" (click)="addLicence()">
    Ajouter une licence
  </button>
</div>

    <!-- Numéro de Série -->
    <div class="form-group mb-3">
      <label for="numeroSerieBoitier" class="form-label">Numéro de Série</label>
      <input
        type="text"
        id="numeroSerieBoitier"
        class="form-control"
        formControlName="numeroSerieBoitier"
        placeholder="Numéro de série"
      />
      <div *ngIf="PaloForm.get('numeroSerieBoitier')?.touched && PaloForm.get('numeroSerieBoitier')?.invalid" class="text-danger">
        Ce champ est obligatoire.
      </div>
    </div>

    

        <!-- Durée de la Licence -->
    <div class="form-group mb-3">
      <label for="dureeDeLicence" class="form-label">Durée de la Licence</label>
      <input
        type="text"
        id="dureeDeLicence"
        class="form-control"
        formControlName="dureeDeLicence"
        placeholder="Durée de la licence"
      />
    </div>

    <!-- Nom du Contact -->
    <div class="form-group mb-3">
      <label for="nomDuContact" class="form-label">Contact Client</label>
      <input
        type="text"
        id="nomDuContact"
        class="form-control"
        formControlName="nomDuContact"
        placeholder="Nom du contact"
      />
    </div>

<!-- Numéro -->
    <div class="form-group mb-3">
      <label for="numero" class="form-label">N° Client</label>
      <input
        type="text"
        id="numero"
        class="form-control"
        formControlName="numero"
        placeholder="Numéro du contact"
      />
    </div>
    <!-- Adresse Email Contact -->
    <div class="form-group mb-3">
      <label for="adresseEmailContact" class="form-label">Email Client </label>
      <input
        type="email"
        id="adresseEmailContact"
        class="form-control"
        formControlName="adresseEmailContact"
        placeholder="Email du contact"
      />
      <div *ngIf="PaloForm.get('adresseEmailContact')?.touched && PaloForm.get('adresseEmailContact')?.invalid" class="text-danger">
        Veuillez entrer une adresse email valide.
      </div>
    </div>
    

      <!-- Email Admin -->
<div class="form-group mb-3">
  <label for="mailAdmin" class="form-label">Email Commercial</label>
  <input type="email" id="mailAdmin" formControlName="mailAdmin" class="form-control" placeholder="Email de l'administrateur" />
</div>
<!-- CC Mail -->
<div class="form-group mb-3">
  <label>Emails en copie (CC)</label>
  <div *ngIf="PaloForm.get('ccMail') as cc">
    <div [formArrayName]="'ccMail'">
      <div *ngFor="let control of cc.controls; let i = index" class="d-flex mb-2">
        <input
          [formControlName]="i"
          type="email"
          class="form-control me-2"
          placeholder="Email en copie"
        />
        <button type="button" class="btn btn-danger" (click)="removeCcMail(i)">Supprimer</button>
      </div>
    </div>
  </div>
  <button type="button" class="btn btn-secondary mt-2" (click)="addCcMail()">Ajouter Email</button>
</div>
    <!-- Remarque -->
    <div class="form-group mb-3">
      <label for="remarque" class="form-label">Remarque</label>
      <textarea
        id="remarque"
        class="form-control"
        formControlName="remarque"
        placeholder="Ajouter une remarque"
      ></textarea>
    </div>
    <!-- Sous Contrat -->
      <div class="form-group mb-3 form-check">
        <input type="checkbox" id="sousContrat" class="form-check-input" formControlName="sousContrat" />
        <label for="sousContrat" class="form-check-label">Sous Contrat</label>
      </div>

    <!-- Section Upload de Fichier -->
    <div class="form-group mb-3">
      <label class="form-label"><strong>📎 Fichier attaché</strong></label>
      
      <!-- Fichier sélectionné -->
      <div *ngIf="selectedFile" class="alert alert-info mb-2">
        <i class="fa fa-file"></i> 
        <span class="ms-2">{{ selectedFile.name }}</span>
        <button type="button" class="btn btn-sm btn-danger ms-2" (click)="selectedFile = null">×</button>
      </div>

      <!-- Upload fichier -->
      <div class="input-group">
        <input 
          type="file" 
          class="form-control" 
          (change)="onFileSelected($event)"
          #fileInput
        />
      </div>
      <small class="text-muted">Le fichier sera uploadé après la création du Palo</small>

      <!-- Message de succès/erreur -->
      <div *ngIf="uploadMessage" class="mt-2">
        <div [class]="uploadSuccess ? 'alert alert-success' : 'alert alert-danger'">
          <i [class]="uploadSuccess ? 'fa fa-check-circle' : 'fa fa-exclamation-circle'"></i>
          {{ uploadMessage }}
        </div>
      </div>
    </div>
 

<div class="form-group">
        <label for="commandePasserPar">Commande Passer Par</label>
        <select id="commandePasserPar" formControlName="commandePasserPar" class="form-control">
          <option *ngFor="let option of commandePasserParOptions" [value]="option.value">
            {{ option.label }}
          </option>
        </select>
      </div>
  



    <!-- Bouton Ajouter -->
    <button type="submit" class="btn btn-primary" [disabled]="PaloForm.invalid">
      Ajouter
    </button>
    <button type="button" class="btn btn-secondary" (click)="onCancel()">Annuler</button>
  </form>
  
</div>
