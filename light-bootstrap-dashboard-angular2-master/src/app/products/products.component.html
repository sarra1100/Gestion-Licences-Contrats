<div class="container mt-5">

  <h2 class="text-center mb-4">
    Ajouter licence ESET
  </h2>

  <form [formGroup]="productForm" (ngSubmit)="addProduct()" class="form-wrapper">
    <!-- Client -->
    <div class="form-group">
      <label for="client" class="form-label">
        Client
      </label>
      <app-searchable-client-select formControlName="client" [clients]="clients"></app-searchable-client-select>
      <div *ngIf="productForm.get('client')?.touched && productForm.get('client')?.invalid" class="text-danger">
        Ce champ est obligatoire.
      </div>
    </div>

    <!-- Identifiant -->
    <div class="form-group">
      <label for="identifiant" class="form-label">
        Identifiant
      </label>
      <input
        type="text"
        id="identifiant"
        class="form-control"
        formControlName="identifiant"
        placeholder="Entrez l'identifiant"
      />
      <div *ngIf="productForm.get('identifiant')?.touched && productForm.get('identifiant')?.invalid" class="text-danger">
        Ce champ est obligatoire.
      </div>
    </div>

    <!-- Clé de Licence -->
    <div class="form-group">
      <label for="cle_de_Licence" class="form-label">
        Clé de Licence
      </label>
      <input
        type="text"
        id="cle_de_Licence"
        class="form-control"
        formControlName="cle_de_Licence"
        placeholder="Entrez la clé de licence"
      />
      <div *ngIf="productForm.get('cle_de_Licence')?.touched && productForm.get('cle_de_Licence')?.invalid" class="text-danger">
        Ce champ est obligatoire.
      </div>
    </div>

    <!-- Row: Produit + Quantité -->
    <div class="form-row">
      <!-- Nom du Produit avec dropdown personnalisé et poubelle pour chaque produit -->
      <div class="form-group">
        <label for="nom_produit" class="form-label">
          Nom du Produit
        </label>
        <div style="display: flex; gap: 0.5rem; align-items: flex-start;">
          <div class="product-dropdown-wrapper" style="position: relative; z-index: 100;">
            <button
              type="button"
              class="form-control text-start product-dropdown-button"
              [class.open]="showProductDropdown"
              (click)="showProductDropdown = !showProductDropdown"
            >
              {{ productForm.get('nom_produit')?.value || '-- Sélectionner un produit --' }}
              <i class="fas fa-chevron-down"></i>
            </button>
            <!-- Dropdown personnalisé -->
            <div 
              *ngIf="showProductDropdown"
              class="product-dropdown-content"
              style="z-index: 101;"
              (click)="$event.stopPropagation()"
            >
              <div
                *ngFor="let product of nomProduitOptions"
              >
                <span
                  (click)="selectProduct(product.value); showProductDropdown = false"
                >
                  {{ product.display }}
                </span>
                <!-- Poubelle pour supprimer (Admin seulement) -->
                <button
                  type="button"
                  class="md-btn-icon md-btn-remove"
                  (click)="deleteProduct(product.value); $event.stopPropagation()"
                  *ngIf="isAdmin()"
                  title="Supprimer ce produit"
                >
                  <i class="fas fa-trash"></i>
                </button>
              </div>
            </div>
          </div>
          <!-- Bouton + pour ajouter (Admin seulement) -->
          <button 
            type="button" 
            class="md-btn-icon md-btn-add"
            (click)="openAddProduitModal()"
            *ngIf="isAdmin()"
            title="Ajouter un nouveau produit"
            style="position: relative; z-index: 100;"
          >
            <i class="fas fa-plus"></i>
          </button>
        </div>
      </div>

      <!-- Quantité -->
      <div class="form-group">
        <label for="nombre" class="form-label">
          Quantité
        </label>
        <input
          type="number"
          id="nombre"
          class="form-control"
          formControlName="nombre"
          placeholder="0"
          min="1"
        />
      </div>
    </div>

    <!-- Row: Type d'Achat + Date d'expiration -->
    <div class="form-row">
      <!-- Type d'Achat -->
      <div class="form-group">
        <label for="typeAchat" class="form-label">
          Type d'Achat
        </label>
        <select id="typeAchat" formControlName="typeAchat" class="form-control">
          <option value="">-- Sélectionner un type --</option>
          <option *ngFor="let type of typeAchatOptions" [value]="type.value">{{ type.display }}</option>
        </select>
      </div>

      <!-- Date d'expiration -->
      <div class="form-group">
        <label for="dateEx" class="form-label">
          Date d'expiration
        </label>
        <input
          type="date"
          id="dateEx"
          class="form-control"
          formControlName="dateEx"
        />
      </div>
    </div>

    <!-- Commande Passer Par -->
    <div class="form-group">
      <label for="commandePasserPar" class="form-label">
        Commande Passer Par
      </label>
      <select id="commandePasserPar" formControlName="commandePasserPar" class="form-control">
        <option value="">-- Sélectionner --</option>
        <option *ngFor="let option of commandePasserParOptions" [value]="option.value">{{ option.label }}</option>
      </select>
    </div>

    <!-- Durée de la Licence -->
    <div class="form-group">
      <label for="dureeDeLicence" class="form-label">
        Durée de la Licence
      </label>
      <input
        type="text"
        id="dureeDeLicence"
        class="form-control"
        formControlName="dureeDeLicence"
        placeholder="Ex: 12 mois"
      />
    </div>

    <!-- Row: Vis-a-Vis Client + Téléphone -->
    <div class="form-row">
      <!-- Vis-a-Vis Client -->
      <div class="form-group">
        <label for="nom_contact" class="form-label">
          Vis-a-Vis Client
          <span class="badge-autofill" *ngIf="productForm.get('nom_contact')?.value">Auto</span>
        </label>
        <input
          type="text"
          id="nom_contact"
          class="form-control"
          formControlName="nom_contact"
          placeholder="Auto-rempli depuis le client"
        />
      </div>

      <!-- N° Téléphone -->
      <div class="form-group">
        <label for="nmb_tlf" class="form-label">
          N° Téléphone
          <span class="badge-autofill" *ngIf="productForm.get('nmb_tlf')?.value">Auto</span>
        </label>
        <input
          type="text"
          id="nmb_tlf"
          class="form-control"
          formControlName="nmb_tlf"
          placeholder="Auto-rempli depuis le client"
        />
      </div>
    </div>

    <!-- Row: Email Client + Email Commercial -->
    <div class="form-row">
      <!-- Email Client -->
      <div class="form-group">
        <label for="mail" class="form-label">
          Email Client
          <span class="badge-autofill" *ngIf="productForm.get('mail')?.value">Auto</span>
        </label>
        <input
          type="email"
          id="mail"
          class="form-control"
          formControlName="mail"
          placeholder="Auto-rempli depuis le client"
        />
        <div *ngIf="productForm.get('mail')?.touched && productForm.get('mail')?.invalid" class="text-danger">
          Email invalide.
        </div>
      </div>

      <!-- Email Commercial -->
      <div class="form-group">
        <label for="mailAdmin" class="form-label">
          Email Commercial
        </label>
        <input 
          type="email" 
          id="mailAdmin" 
          class="form-control"
          formControlName="mailAdmin" 
          placeholder="Email commercial"
        />
      </div>
    </div>

    <!-- CC Mails -->
    <div class="form-group">
      <label class="form-label">
        Emails en Copie (CC)
      </label>
      <div *ngIf="productForm.get('ccMail') as cc">
        <div [formArrayName]="'ccMail'">
          <div *ngFor="let control of cc.controls; let i = index" class="cc-email-row">
            <input
              [formControlName]="i"
              type="email"
              class="form-control"
              placeholder="Email en copie"
            />
            <button 
              type="button" 
              class="md-btn-icon md-btn-remove" 
              (click)="removeCcMail(i)" 
              title="Supprimer"
            >
              <i class="fas fa-minus"></i>
            </button>
          </div>
          <button 
            type="button" 
            class="md-btn-icon md-btn-add" 
            (click)="addCcMail()" 
            title="Ajouter un email"
          >
            <i class="fas fa-plus"></i>
          </button>
        </div>
      </div>
    </div>

    <!-- Row: Remarque + Sous Contrat -->
    <div class="form-group">
      <label for="remarque" class="form-label">
        Remarque
      </label>
      <textarea
        id="remarque"
        class="form-control"
        formControlName="remarque"
        placeholder="Ajouter une remarque..."
        rows="3"
      ></textarea>
    </div>

    <div class="form-group form-check">
      <input 
        type="checkbox" 
        id="sousContrat" 
        class="form-check-input" 
        formControlName="sousContrat"
      />
      <label for="sousContrat" class="form-check-label">
        Sous Contrat
      </label>
    </div>
    
    <div class="form-group">
      <label class="form-label">
        Sélectionner un fichier
      </label>
      <div class="file-input-wrapper">
        <input 
          type="file" 
          class="form-control" 
          (change)="onFileSelected($event)"
          #fileInput
          id="fileInput"
        />
        <label for="fileInput" class="file-input-label">
          <span>{{ selectedFile ? selectedFile.name : 'Cliquez pour sélectionner...' }}</span>
        </label>
      </div>
      <div *ngIf="uploadSuccess" class="alert alert-success mt-2">
        {{ uploadMessage }}
      </div>
      <div *ngIf="!uploadSuccess && uploadMessage" class="alert alert-danger mt-2">
        {{ uploadMessage }}
      </div>
    </div>

    <div class="form-buttons">
      <button type="submit" class="btn btn-primary">Ajouter Licence</button>
      <button type="reset" class="btn btn-secondary">Réinitialiser</button>
    </div>
  </form>
</div>

<!-- Modal simple pour ajouter un produit -->
<div *ngIf="showQuickAddProduit" class="modal-backdrop show" style="display: block; background-color: rgba(0,0,0,0.5); position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1040;">
  <div class="modal show" style="display: block; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1050; width: 400px; border-radius: 12px; box-shadow: 0 5px 30px rgba(0,0,0,0.3); background: white;">
    <div class="modal-header" style="background: #ffc107; color: #333; padding: 1.5rem; border-bottom: 2px solid #ffb300; display: flex; justify-content: space-between; align-items: center;">
      <h5 style="margin: 0; font-weight: 700;">Ajouter un nouveau produit</h5>
      <button 
        type="button" 
        class="btn-close"
        (click)="closeAddProduitModal()"
        style="background: none; border: none; font-size: 1.5rem; cursor: pointer;"
      >
        ×
      </button>
    </div>
    
    <div class="modal-body" style="padding: 2rem;">
      <div class="form-group">
        <label for="quickProduitName" class="form-label" style="font-weight: 600; margin-bottom: 0.5rem;">
          Nom du Produit *
        </label>
        <input
          type="text"
          id="quickProduitName"
          class="form-control"
          [(ngModel)]="quickProduitName"
          placeholder="Ex: ESET PROTECT Entry"
          (keyup.enter)="quickAddProduit()"
        />
        <small class="text-danger" *ngIf="quickProduitError" style="margin-top: 0.3rem; display: block;">
          {{ quickProduitError }}
        </small>
      </div>
    </div>
    
    <div class="modal-footer" style="padding: 1.5rem; border-top: 1px solid #eee; display: flex; gap: 0.8rem; justify-content: flex-end;">
      <button 
        type="button" 
        class="btn btn-secondary"
        (click)="closeAddProduitModal()"
      >
        Annuler
      </button>
      <button 
        type="button" 
        class="btn btn-warning"
        (click)="quickAddProduit()"
        [disabled]="!quickProduitName || quickProduitName.trim().length < 3"
      >
        <i class="fas fa-check"></i> Ajouter
      </button>
    </div>
  </div>
</div>
