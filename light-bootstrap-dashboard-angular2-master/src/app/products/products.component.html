<div class="container mt-5">
  <h2 class="text-center mb-4">
    Ajouter licence ESET
  </h2>

  <form [formGroup]="productForm" (ngSubmit)="addProduct()" class="form-wrapper">
    <!-- Client -->
    <div class="form-group">
      <label for="client" class="form-label">
        Client
      </label>
      <app-searchable-client-select formControlName="client" [clients]="clients"></app-searchable-client-select>
      <div *ngIf="productForm.get('client')?.touched && productForm.get('client')?.invalid" class="text-danger">
        Ce champ est obligatoire.
      </div>
    </div>

    <!-- Identifiant -->
    <div class="form-group">
      <label for="identifiant" class="form-label">
        Identifiant
      </label>
      <input
        type="text"
        id="identifiant"
        class="form-control"
        formControlName="identifiant"
        placeholder="Entrez l'identifiant"
      />
      <div *ngIf="productForm.get('identifiant')?.touched && productForm.get('identifiant')?.invalid" class="text-danger">
        Ce champ est obligatoire.
      </div>
    </div>

    <!-- Clé de Licence -->
    <div class="form-group">
      <label for="cle_de_Licence" class="form-label">
        Clé de Licence
      </label>
      <input
        type="text"
        id="cle_de_Licence"
        class="form-control"
        formControlName="cle_de_Licence"
        placeholder="Entrez la clé de licence"
      />
      <div *ngIf="productForm.get('cle_de_Licence')?.touched && productForm.get('cle_de_Licence')?.invalid" class="text-danger">
        Ce champ est obligatoire.
      </div>
    </div>

    <!-- Row: Produit + Quantité -->
    <div class="form-row">
      <!-- Nom du Produit -->
      <div class="form-group">
        <label for="nom_produit" class="form-label">
          Nom du Produit
        </label>
        <select id="nom_produit" formControlName="nom_produit" class="form-control">
          <option value="">-- Sélectionner un produit --</option>
          <option *ngFor="let product of nomProduitOptions" [value]="product.value">{{ product.display }}</option>
        </select>
      </div>

      <!-- Quantité -->
      <div class="form-group">
        <label for="nombre" class="form-label">
          Quantité
        </label>
        <input
          type="number"
          id="nombre"
          class="form-control"
          formControlName="nombre"
          placeholder="0"
          min="1"
        />
      </div>
    </div>

    <!-- Row: Type d'Achat + Date d'expiration -->
    <div class="form-row">
      <!-- Type d'Achat -->
      <div class="form-group">
        <label for="typeAchat" class="form-label">
          Type d'Achat
        </label>
        <select id="typeAchat" formControlName="typeAchat" class="form-control">
          <option value="">-- Sélectionner un type --</option>
          <option *ngFor="let type of typeAchatOptions" [value]="type.value">{{ type.display }}</option>
        </select>
      </div>

      <!-- Date d'expiration -->
      <div class="form-group">
        <label for="dateEx" class="form-label">
          Date d'expiration
        </label>
        <input
          type="date"
          id="dateEx"
          class="form-control"
          formControlName="dateEx"
        />
      </div>
    </div>

    <!-- Commande Passer Par -->
    <div class="form-group">
      <label for="commandePasserPar" class="form-label">
        Commande Passer Par
      </label>
      <select id="commandePasserPar" formControlName="commandePasserPar" class="form-control">
        <option value="">-- Sélectionner --</option>
        <option *ngFor="let option of commandePasserParOptions" [value]="option.value">{{ option.label }}</option>
      </select>
    </div>

    <!-- Durée de la Licence -->
    <div class="form-group">
      <label for="dureeDeLicence" class="form-label">
        Durée de la Licence
      </label>
      <input
        type="text"
        id="dureeDeLicence"
        class="form-control"
        formControlName="dureeDeLicence"
        placeholder="Ex: 12 mois"
      />
    </div>

    <!-- Row: Vis-a-Vis Client + Téléphone -->
    <div class="form-row">
      <!-- Vis-a-Vis Client -->
      <div class="form-group">
        <label for="nom_contact" class="form-label">
          Vis-a-Vis Client
          <span class="badge-autofill" *ngIf="productForm.get('nom_contact')?.value">Auto</span>
        </label>
        <input
          type="text"
          id="nom_contact"
          class="form-control"
          formControlName="nom_contact"
          placeholder="Auto-rempli depuis le client"
        />
      </div>

      <!-- N° Téléphone -->
      <div class="form-group">
        <label for="nmb_tlf" class="form-label">
          N° Téléphone
          <span class="badge-autofill" *ngIf="productForm.get('nmb_tlf')?.value">Auto</span>
        </label>
        <input
          type="text"
          id="nmb_tlf"
          class="form-control"
          formControlName="nmb_tlf"
          placeholder="Auto-rempli depuis le client"
        />
      </div>
    </div>

    <!-- Row: Email Client + Email Commercial -->
    <div class="form-row">
      <!-- Email Client -->
      <div class="form-group">
        <label for="mail" class="form-label">
          Email Client
          <span class="badge-autofill" *ngIf="productForm.get('mail')?.value">Auto</span>
        </label>
        <input
          type="email"
          id="mail"
          class="form-control"
          formControlName="mail"
          placeholder="Auto-rempli depuis le client"
        />
        <div *ngIf="productForm.get('mail')?.touched && productForm.get('mail')?.invalid" class="text-danger">
          Email invalide.
        </div>
      </div>

      <!-- Email Commercial -->
      <div class="form-group">
        <label for="mailAdmin" class="form-label">
          Email Commercial
        </label>
        <input 
          type="email" 
          id="mailAdmin" 
          class="form-control"
          formControlName="mailAdmin" 
          placeholder="Email commercial"
        />
      </div>
    </div>

    <!-- CC Mails -->
    <div class="form-group">
      <label class="form-label">
        Emails en Copie (CC)
      </label>
      <div *ngIf="productForm.get('ccMail') as cc">
        <div [formArrayName]="'ccMail'">
          <div *ngFor="let control of cc.controls; let i = index" class="cc-email-row">
            <input
              [formControlName]="i"
              type="email"
              class="form-control"
              placeholder="Email en copie"
            />
            <button type="button" class="cc-btn-icon cc-btn-remove" (click)="removeCcMail(i)" title="Supprimer">
              <i class="fas fa-minus"></i>
            </button>
          </div>
          <button type="button" class="cc-btn-icon cc-btn-add" (click)="addCcMail()" title="Ajouter un email">
            <i class="fas fa-plus"></i>
          </button>
        </div>
      </div>
    </div>

    <!-- Row: Remarque + Sous Contrat -->
    <div class="form-group">
      <label for="remarque" class="form-label">
        Remarque
      </label>
      <textarea
        id="remarque"
        class="form-control"
        formControlName="remarque"
        placeholder="Ajouter une remarque..."
        rows="3"
      ></textarea>
    </div>

    <div class="form-group form-check">
      <input 
        type="checkbox" 
        id="sousContrat" 
        class="form-check-input" 
        formControlName="sousContrat"
      />
      <label for="sousContrat" class="form-check-label">
        Sous Contrat
      </label>
    </div>
    
    <div class="form-group">
      <label class="form-label">
        Sélectionner un fichier
      </label>
      <div class="file-input-wrapper">
        <input 
          type="file" 
          class="form-control" 
          (change)="onFileSelected($event)"
          #fileInput
          id="fileInput"
        />
        <label for="fileInput" class="file-input-label">
          <span>{{ selectedFile ? selectedFile.name : 'Cliquez pour sélectionner...' }}</span>
        </label>
      </div>
      <small class="text-muted">
        Le fichier sera uploadé après la création.
      </small>
    </div>

    <!-- Boutons -->
    <div class="form-buttons">
      <button type="button" class="btn btn-secondary" (click)="onCancel()">
        Annuler
      </button>
      <button type="submit" class="btn btn-primary" [disabled]="!productForm.valid">
        Ajouter ESET
      </button>
    </div>
  </form>
</div>
